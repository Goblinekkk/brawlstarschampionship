<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brawl Stars Czechia Esports</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>BS Czechia Esports</h1>

  <!-- NAV MENU -->
  <div class="menu">
    <button onclick="showTab('events')">Events</button>
    <button onclick="showTab('live')">Live Events</button>
    <button onclick="showTab('players')">Players</button>
    <button onclick="showTab('free')">Free Slots</button>
    <button onclick="adminLogin()">Admin</button>
  </div>

  <!-- LOGIN -->
  <div id="loginBox" class="card">
    <button id="googleLogin">Sign in with Google</button>
  </div>

  <!-- PROFILE -->
  <div id="profile" class="card hidden">
    <img id="avatar">
    <h3 id="name"></h3>

    <input id="tag" placeholder="#BRAWL_TAG">
    <button id="saveTag">Save Player</button>
  </div>

  <!-- EVENTS -->
  <div id="eventsTab" class="tab"></div>

  <!-- LIVE -->
  <div id="liveTab" class="tab hidden"></div>

  <!-- PLAYERS -->
  <div id="playersTab" class="tab hidden"></div>

  <!-- FREE -->
  <div id="freeTab" class="tab hidden"></div>

  <!-- ADMIN -->
  <div id="adminPanel" class="card hidden">

    <h2>Create Event</h2>

    <input id="eventName" placeholder="Event name">
    <input id="eventMax" placeholder="Max players">
    <input id="eventPrize" placeholder="Prize">
    <input id="eventDesc" placeholder="Description">

    <button id="createEvent">Create Event</button>

  </div>

</div>

<script type="module" src="script.js"></script>
</body>
</html>
