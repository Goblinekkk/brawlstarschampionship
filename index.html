<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BS Championship CZ</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- LOADING -->
<div id="loadingScreen">
  <h1>Český Brawl Stars Championship</h1>
  <div class="loader"></div>
</div>

<!-- LOGIN -->
<div id="loginScreen" class="hidden">
  <h1>Český Brawl Stars Championship</h1>

  <button id="googleLogin" class="googleBtn">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">
    Přihlásit se pomocí Google
  </button>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="menuBtn" id="menuBtn">☰</div>
    <h2>BS Championship</h2>
  </div>

  <!-- SIDEBAR -->
  <div id="sidebar" class="sidebar hidden">

    <div onclick="showTab('live')">🔴 Probíhající eventy</div>
    <div onclick="showTab('upcoming')">🟡 Nadcházející eventy</div>
    <div onclick="showTab('players')">👥 Hráči</div>

    <div class="adminSmall" onclick="openAdmin()">
      Admin
    </div>

  </div>

  <!-- CONTENT -->
  <div class="container">

    <div id="live" class="tab"></div>
    <div id="upcoming" class="tab hidden"></div>
    <div id="players" class="tab hidden"></div>

  </div>

  <!-- ADMIN PANEL -->
  <div id="adminPanel" class="admin hidden">

    <h2>Vytvořit Event</h2>

    <input id="eventName" placeholder="Název eventu">
    <input id="eventMax" placeholder="Max hráčů">
    <input id="eventPrize" placeholder="O co se hraje">

    <button id="createEvent">Vytvořit</button>

  </div>

</div>

<script type="module" src="script.js"></script>
</body>
</html>
